<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>motion studio</title>
		<style>
			:root {
				color-scheme: dark;
			}
			body {
				margin: 0;
				background: #16161d;
				color: #e8e8ef;
				font-family:
					ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
			}
			#root {
				display: flex;
				min-height: 100vh;
			}
			.studio-sidebar {
				width: 220px;
				flex-shrink: 0;
				border-right: 1px solid #2a2a35;
				padding: 12px;
				box-sizing: border-box;
			}
			.studio-sidebar h1 {
				font-size: 13px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: #8a8a99;
				margin: 4px 4px 12px;
			}
			.studio-scene-button {
				display: block;
				width: 100%;
				text-align: left;
				background: none;
				border: none;
				border-radius: 6px;
				color: inherit;
				font: inherit;
				padding: 7px 10px;
				cursor: pointer;
			}
			.studio-scene-button:hover {
				background: #23232e;
			}
			.studio-scene-button[data-active="true"] {
				background: #2e2e3d;
			}
			.studio-scene-button small {
				display: block;
				color: #8a8a99;
				font-size: 11px;
			}
			.studio-main {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				box-sizing: border-box;
				min-width: 0;
			}
			.studio-error {
				max-width: 640px;
				background: #2b1d22;
				border: 1px solid #6e2f3f;
				border-radius: 8px;
				padding: 16px 20px;
			}
			.studio-error h2 {
				margin: 0 0 8px;
				font-size: 15px;
				color: #ff7d9c;
			}
			.studio-error pre {
				margin: 0;
				white-space: pre-wrap;
				word-break: break-word;
				font-size: 12px;
				color: #d8b4bf;
			}
			.studio-empty {
				color: #8a8a99;
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
